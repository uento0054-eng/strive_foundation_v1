workflows:
  android-release:
    name: Strive Android Release
    max_build_duration: 60

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle

    scripts:
      - name: Initialize Flutter project (only if needed)
        script: |
          if [ ! -f ".metadata" ]; then
            flutter create .
          fi

      - name: Get dependencies
        script: flutter pub get

      - name: Clean build
        script: flutter clean

      - name: Build AAB
        script: flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab
