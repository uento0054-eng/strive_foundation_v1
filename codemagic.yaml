workflows:
  android-release:
    name: Strive Android Release
    max_build_duration: 60

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle

    scripts:
      - name: Create Flutter structure
        script: flutter create .

      - name: Upgrade dependencies (FIX V1 embedding)
        script: |
          flutter pub upgrade --major-versions

      - name: Install packages
        script: flutter pub get

      - name: Clean project
        script: flutter clean

      - name: Build AAB
        script: flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab
